services:
  web:
    build: .
    container_name: podcraze_web

    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

    ports:
      - "8001:8000"

    env_file:
      - .env

    environment:
      DB_HOST: host.docker.internal

    restart: unless-stopped